set-window-option -g mode-keys vi

# changing default prefix to CTRL+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Go to last active window
bind-key C-a last-window

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Enable focus-events
set -g focus-events on
set -g mouse on
set -g escape-time 0
set -g history-limit 50000
set -g aggressive-resize on

# Panes
bind-key -r h resize-pane -L 5
bind-key -r j resize-pane -D 5
bind-key -r k resize-pane -U 5
bind-key -r l resize-pane -R 5
bind tab next-layout

# Gave up rememberring % and "
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind O select-pane -t :.- # Do the opposite of o

# pane movement
bind-key S choose-window 'join-pane -v -s "%%"'
bind-key V choose-window 'join-pane -h -s "%%"'

# window prefix-w submenu
bind-key w switch-client -T prefix-w
bind-key -T prefix-w x confirm kill-window
bind-key -T prefix-w c new-window -c "#{pane_current_path}"
bind-key -T prefix-w v split-window -h -c "#{pane_current_path}"
bind-key -T prefix-w s split-window -v -c "#{pane_current_path}"
bind-key -T prefix-w m resize-pane -Z
bind-key -T prefix-w w choose-tree -w
bind-key -T prefix-w Escape switch-client -T root

# session prefix-s submenu
bind-key s switch-client -T prefix-s
bind-key -T prefix-s n command-prompt -p "Session name:" "new-session -s '%%' -c '~'"
bind-key -T prefix-s N new-session -c "~"
bind-key -T prefix-s s choose-tree -s
bind-key -T prefix-s k confirm kill-session
bind-key -T prefix-s r command-prompt -p "Rename session:" "rename-session '%%'"
bind-key -T prefix-s Escape switch-client -T root

set-option -g display-time 2000
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

set -g default-terminal "tmux-256color"

bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R
bind-key -T copy-mode-vi 'M-\' select-pane -l

# Catppuccin theme (Latte)
set -g @catppuccin_flavor 'latte'
set -g @catppuccin_window_status_style "rounded"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{?window_zoomed_flag,#[bg=#d20f39 fg=#eff1f5 bold] ZOOM ,}#{E:@catppuccin_status_application}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"
set -g @catppuccin_window_current_text "#{?window_zoomed_flag, ,} #{window_name}"
set -g status-left-length 100
set -g status-right-length 100

# vim-tmux-navigator
run ~/.dotfiles/vim/plugged/vim-tmux-navigator/vim-tmux-navigator.tmux

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Amp CLI compatibility settings
set -s extended-keys always
bind-key -T root S-Enter send-keys Escape "[13;2u"
set -g allow-passthrough all
set -ga terminal-features ",*:hyperlinks"
set -s set-clipboard on

set -g @plugin 'omerxx/tmux-sessionx'
# I recommend using `o` if not already in use, for least key strokes when launching
set -g @sessionx-bind 'o'
# When set to 'on' a non-result will be sent to zoxide for path matching
# Requires zoxide installed
set -g @sessionx-zoxide-mode 'on'
# `C-x` is customizeable, by default it indexes directories in `$HOME/.config`,
# but this can be changed by adding the config below.
# e.g. set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-x-path '~/lunar'
# A comma delimited absolute-paths list of custom paths
# always visible in results and ready to create a session from.
# Tip: if you're using zoxide mode, there's a good chance this is redundant
set -g @sessionx-custom-paths '/Users/me/projects,/Users/me/second-brain'
# Display the current git branch next to each session name.
# Branches are loaded asynchronously so session list appears instantly.
# Requires git. (default: off)
set -g @sessionx-git-branch 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
